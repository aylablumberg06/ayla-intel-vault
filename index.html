<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayla Intelligence — Private Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400;1,500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231c0c14'/%3E%3Ctext x='50' y='56' text-anchor='middle' font-family='Georgia' font-size='52' font-weight='900' fill='%23c84b6d' font-style='italic'%3EAI%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --parchment: #fdf4ee;
    --ivory: #fff9f5;
    --warm-sand: #f5e6d8;
    --border-cream: rgba(180,100,120,0.12);
    --ring-warm: rgba(200,75,109,0.22);
    --pink-soft: rgba(200,75,109,0.08);
    --pink-ring: rgba(200,75,109,0.28);
    --pink-faint: #fce8ef;
    --near-black: #1c0c14;
    --dark-surface: #2a1520;
    --charcoal: #4a2332;
    --olive: #7a4a5c;
    --stone: #b09098;
    --warm-silver: #e5c9d3;
    --pink: #c84b6d;
    --pink-light: #e38ca8;
    --rose: #9e2d52;
    --green: #2d7a56;
    --amber: #c4611a;
    --purple: #6b3d9a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--parchment);
    color: var(--near-black);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: 'Playfair Display', Georgia, serif; font-weight: 500; }

  /* ── Login ── */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-card {
    width: 100%;
    max-width: 420px;
    background: var(--ivory);
    border: 1px solid var(--border-cream);
    border-radius: 20px;
    padding: 44px 40px;
    box-shadow: rgba(80,20,40,0.06) 0 12px 36px;
  }
  .logo-mark { display: inline-flex; align-items: baseline; line-height: 1; }
  .logo-mark .hl { color: var(--pink); font-weight: 900; }
  .logo-mark .base { color: var(--near-black); font-weight: 500; }
  .logo-mark.dark .base { color: var(--ivory); }
  .logo-mark.dark .hl { color: var(--pink-light); }

  /* ── Layout ── */
  .shell { display: none; min-height: 100vh; }
  .shell.open { display: flex; }
  .sidebar {
    width: 234px;
    flex-shrink: 0;
    background: var(--near-black);
    color: var(--warm-silver);
    padding: 32px 20px;
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .sidebar h2 { font-size: 17px; margin-bottom: 4px; }
  .sidebar .subtitle {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: 32px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 2px;
    border-radius: 10px;
    background: transparent;
    color: var(--warm-silver);
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    text-align: left;
    transition: all 0.2s ease;
  }
  .nav-item:hover { background: rgba(255,255,255,0.04); }
  .nav-item.active { background: rgba(227,140,168,0.12); color: var(--pink-light); }
  .nav-icon { font-size: 13px; opacity: 0.7; width: 16px; }
  .sidebar-footer {
    border-top: 1px solid var(--dark-surface);
    padding-top: 16px;
    margin-top: 16px;
  }
  .sidebar-footer button, .sidebar-footer a {
    display: block;
    width: 100%;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--stone);
    background: transparent;
    border: none;
    cursor: pointer;
    text-align: left;
    border-radius: 8px;
    font-family: inherit;
    text-decoration: none;
    transition: color 0.2s ease;
  }
  .sidebar-footer button:hover, .sidebar-footer a:hover { color: var(--pink-light); }

  main { flex: 1; min-width: 0; padding: 44px 48px 80px; overflow-x: hidden; }

  /* ── Typography ── */
  h1.page-title {
    font-size: clamp(1.9rem, 4vw, 2.6rem);
    font-weight: 500;
    font-family: 'Playfair Display', Georgia, serif;
    line-height: 1.1;
  }
  .eyebrow {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 10px;
  }
  .overline {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--stone);
  }
  .caption { font-size: 14px; color: var(--olive); }

  /* ── Cards ── */
  .card {
    background: var(--ivory);
    border: 1px solid var(--border-cream);
    border-radius: 16px;
    padding: 24px;
    transition: box-shadow 0.3s ease, transform 0.3s ease;
  }
  .card:hover { box-shadow: rgba(80,20,40,0.06) 0 6px 20px; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    border: none;
    text-decoration: none;
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  .btn-pink { background: var(--pink); color: var(--ivory); }
  .btn-pink:hover { background: var(--rose); transform: translateY(-1px); box-shadow: 0 8px 22px rgba(200,75,109,0.25); }
  .btn-ghost { background: transparent; color: var(--olive); border: 1px solid var(--border-cream); }
  .btn-ghost:hover { background: var(--ivory); color: var(--pink); border-color: var(--pink-ring); }
  .btn-danger { background: transparent; color: var(--pink); border: 1px solid rgba(200,75,109,0.25); }
  .btn-danger:hover { background: rgba(200,75,109,0.06); }
  .btn-sm { padding: 7px 14px; font-size: 12px; }
  .btn[disabled] { opacity: 0.4; pointer-events: none; }

  /* ── Inputs ── */
  .input, textarea.input, select.input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    background: var(--parchment);
    border: 1px solid var(--border-cream);
    color: var(--near-black);
    outline: none;
    font-family: inherit;
    transition: box-shadow 0.2s ease, border-color 0.2s ease;
  }
  .input:focus { border-color: var(--pink); box-shadow: 0 0 0 3px var(--pink-soft); }
  textarea.input { resize: vertical; }
  label.label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--olive);
    margin-bottom: 8px;
  }

  /* ── Section header ── */
  .section-header {
    margin-bottom: 32px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
    flex-wrap: wrap;
  }
  .section-header h1 { margin-top: 0; }
  .section-header .subtitle { margin-top: 6px; color: var(--olive); font-size: 14px; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ── KPIs ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 40px;
  }
  .kpi-value {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 38px;
    font-weight: 500;
    color: var(--pink);
    line-height: 1;
    margin-top: 10px;
  }
  .kpi-hint { font-size: 12px; color: var(--stone); margin-top: 8px; }

  /* ── Pills ── */
  .pill {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .pill-new, .pill-hot { background: rgba(200,75,109,0.16); color: var(--pink); border: 1px solid rgba(200,75,109,0.3); }
  .pill-in-convo, .pill-building, .pill-pending { background: rgba(196,97,26,0.12); color: var(--amber); border: 1px solid rgba(196,97,26,0.25); }
  .pill-proposal-sent, .pill-sent { background: rgba(107,61,154,0.12); color: var(--purple); border: 1px solid rgba(107,61,154,0.25); }
  .pill-closed-won, .pill-accepted, .pill-paid, .pill-active, .pill-live { background: rgba(45,122,86,0.14); color: var(--green); border: 1px solid rgba(45,122,86,0.3); }
  .pill-closed-lost, .pill-rejected, .pill-ended, .pill-paused { background: rgba(176,144,152,0.2); color: var(--olive); border: 1px solid rgba(176,144,152,0.3); }
  .pill-draft, .pill-dev { background: rgba(45,92,154,0.1); color: #2d5c9a; border: 1px solid rgba(45,92,154,0.25); }
  .pill-overdue { background: rgba(200,75,109,0.22); color: var(--pink); border: 1px solid rgba(200,75,109,0.4); }
  .pill-viewed { background: rgba(45,92,154,0.12); color: #2d5c9a; border: 1px solid rgba(45,92,154,0.25); }

  /* ── Modal ── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(28,12,20,0.52);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    width: 100%;
    max-width: 620px;
    max-height: 90vh;
    overflow-y: auto;
    background: var(--ivory);
    border-radius: 20px;
    box-shadow: 0 24px 60px rgba(28,12,20,0.2);
  }
  .modal-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border-cream);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h2 { font-size: 20px; }
  .modal-close {
    background: transparent;
    border: none;
    font-size: 22px;
    color: var(--stone);
    cursor: pointer;
    line-height: 1;
  }
  .modal-body { padding: 24px 28px 28px; }

  /* ── Grid helpers ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field-row { margin-bottom: 14px; }
  .list-grid { display: grid; gap: 14px; }

  /* ── Item rows ── */
  .item-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    flex-wrap: wrap;
  }
  .item-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .item-title { font-size: 19px; font-weight: 500; font-family: 'Playfair Display', Georgia, serif; }
  .item-actions { display: flex; gap: 8px; flex-shrink: 0; }

  /* ── Activity feed ── */
  .activity-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-cream);
  }
  .activity-row:last-child { border-bottom: none; }
  .activity-icon { color: var(--pink); font-size: 14px; width: 18px; }
  .activity-text { font-size: 14px; flex: 1; }
  .activity-time { font-size: 12px; color: var(--stone); }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 48px; }
  .empty-text { color: var(--stone); font-size: 14px; }

  /* ── Filter bar ── */
  .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-bar .input { flex: 1; min-width: 200px; }
  .filter-bar select { width: auto; flex: 0 1 auto; }

  /* ── Tier grid for proposals ── */
  .tier-grid {
    display: grid;
    gap: 8px;
    margin-top: 10px;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  }
  .tier-card {
    padding: 10px 14px;
    background: var(--parchment);
    border-radius: 10px;
  }
  .tier-price {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--pink);
  }
  .tier-row {
    padding: 12px 14px;
    background: var(--parchment);
    border-radius: 10px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 1fr 110px 110px 40px;
    gap: 8px;
    align-items: center;
  }
  .inv-row {
    padding: 10px;
    background: var(--parchment);
    border-radius: 10px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 80px 130px 110px 110px 40px;
    gap: 8px;
    align-items: center;
    row-gap: 8px;
  }
  .inv-view-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border-cream);
    gap: 10px;
    font-size: 13px;
  }
  .inv-view-row:last-child { border-bottom: none; }

  /* ── Agent team display ── */
  .agents-display {
    margin-top: 18px;
    padding: 16px 18px;
    background: var(--parchment);
    border-radius: 12px;
  }
  .agents-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 10px;
  }
  .agent-card-mini {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 10px 12px;
    background: var(--ivory);
    border-radius: 10px;
    border: 1px solid var(--border-cream);
  }
  .agent-emoji { font-size: 18px; }
  .agent-name { font-family: 'Playfair Display', Georgia, serif; font-size: 14px; font-weight: 500; }
  .agent-role { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
  .agent-desc { font-size: 11px; color: var(--olive); margin-top: 4px; line-height: 1.4; }

  /* ── Banner ── */
  .banner {
    padding: 14px 18px;
    border-radius: 12px;
    margin-bottom: 28px;
    font-size: 13px;
  }
  .banner-amber {
    background: rgba(196,97,26,0.08);
    border: 1px solid rgba(196,97,26,0.2);
    color: var(--amber);
  }

  /* ── Agent tag list ── */
  .agent-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .agent-tag {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 100px;
  }

  /* ── Note card ── */
  .note-card {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .note-pin {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: var(--stone);
    line-height: 1;
  }
  .note-pin.active { color: var(--pink); }
  .note-body { font-size: 14px; line-height: 1.6; white-space: pre-wrap; flex: 1; min-width: 0; }
  .note-time { font-size: 11px; color: var(--stone); margin-top: 6px; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 12px 20px;
    background: var(--near-black);
    color: var(--ivory);
    border-radius: 10px;
    font-size: 13px;
    z-index: 300;
    animation: toastIn 0.3s ease;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    main { padding: 24px; }
    .sidebar { display: none; }
    .grid-2 { grid-template-columns: 1fr; }
    .tier-row { grid-template-columns: 1fr 1fr; }
    .inv-row { grid-template-columns: 1fr 1fr; }
  }

  /* ── Activity small ── */
  .kpi-label { font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--stone); }

  ::selection { background: var(--pink); color: var(--ivory); }
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login" class="login-wrap">
  <div class="login-card">
    <div style="text-align:center; margin-bottom: 28px;">
      <div class="logo-mark" style="font-size: 26px;">
        <span class="hl">A</span><span class="base">yla</span>

        <span class="hl">I</span><span class="base">ntelligence</span>

</div>

<!-- ═══ SHELL ═══ -->
<div id="shell" class="shell">
  <aside class="sidebar">
    <div style="margin-bottom: 36px; padding-left: 8px;">
      <div class="logo-mark dark">
        <span class="hl" style="font-size: 17px;">A</span><span class="base" style="font-size: 17px;">yla</span>
        <span style="width: 6px; display: inline-block;"></span>
        <span class="hl" style="font-size: 17px;">I</span><span class="base" style="font-size: 17px;">ntel.</span>

      <button class="nav-item" data-section="contracts"><span class="nav-icon">▣</span>Contracts</button>
      <button class="nav-item" data-section="bots"><span class="nav-icon">◆</span>Bots</button>
      <button class="nav-item" data-section="notes"><span class="nav-icon">✎</span>Notes</button>
      <button class="nav-item" data-section="settings"><span class="nav-icon">⚙</span>Settings</button>
    </nav>

    <div class="sidebar-footer">
      <div id="sync-status" style="padding: 8px 12px; margin-bottom: 8px; font-size: 11px; color: var(--stone); display: flex; align-items: center; gap: 8px;">
        <span id="sync-dot" style="width: 7px; height: 7px; border-radius: 50%; background: #c4611a; flex-shrink: 0;"></span>
        <span id="sync-label">Sync: off</span>
      </div>
      <a href="https://theaylaedit-ai.vercel.app" target="_blank">↗ View public site</a>
      <button id="logout-btn">↗ Log out</button>
    </div>
  </aside>

  <main id="content"></main>
</div>

<!-- ═══ MODAL ═══ -->
<div id="modal" class="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <h2 class="serif" id="modal-title">Edit</h2>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   STATE + STORAGE
══════════════════════════════════════════════════════════ */
const STORE_KEY = 'ayla_intelligence_admin_v6';  // v6: distinct proposal aesthetics per prospect
const PASSWORD_KEY = 'ayla_intelligence_password_v1';
const AUTH_KEY = 'ayla_intelligence_authed_v1';
const SYNC_KEY = 'ayla_intelligence_sync_v1';       // {binId, masterKey, lastSeenId}
const SEEN_MOCKUP_IDS_KEY = 'ayla_intelligence_seen_v1';

const DEFAULTS = {
  prospects: [], teams: [], proposals: [], contracts: [], bots: [], notes: []
};

let state = structuredClone(DEFAULTS);
let currentSection = 'overview';

// ── Seed data (all your real teams, prospects, proposals, contracts, bots, notes) ──
// Auto-loads on first launch if localStorage is empty.

    // Wipe the old "seen mockup IDs" key — the new dedupe logic uses live state only.
    // This ensures any mockups that were hidden after a store-version bump resurface.
    localStorage.removeItem(SEEN_MOCKUP_IDS_KEY);
  } catch (e) { console.error(e); }
}

function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

const uid = (p) => `${p}_${Math.random().toString(36).slice(2, 10)}`;
const fmt$ = (n) => Number(n || 0).toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
const fmtDate = (ms) => new Date(ms).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
const fmtRel = (ms) => {
  const d = (Date.now() - ms) / 1000;
  if (d < 60) return 'just now';
  if (d < 3600) return `${Math.floor(d/60)}m ago`;
  if (d < 86400) return `${Math.floor(d/3600)}h ago`;
  if (d < 86400*7) return `${Math.floor(d/86400)}d ago`;
  return fmtDate(ms);
};
const esc = (s) => String(s || '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ══════════════════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════════════════ */
function initAuth() {
  const authed = sessionStorage.getItem(AUTH_KEY) === 'yes';
  const hasPassword = !!localStorage.getItem(PASSWORD_KEY);

  if (!hasPassword) {
    document.getElementById('setup-hint').innerHTML = `
      <p class="caption" style="font-size: 12px; text-align: center;">
        🌸 First-time setup — the password you enter now becomes your admin password.
        It's stored in this browser only (hashed).
      </p>`;
  }

  if (authed) showShell();
  else showLogin();

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = document.getElementById('login-password').value;
    const err = document.getElementById('login-error');
    err.style.display = 'none';

    const hashed = await sha256(pw);
    const stored = localStorage.getItem(PASSWORD_KEY);

    if (!stored) {
      if (pw.length < 4) { err.textContent = 'Pick something longer than 4 chars.'; err.style.display = 'block'; return; }
      localStorage.setItem(PASSWORD_KEY, hashed);
      sessionStorage.setItem(AUTH_KEY, 'yes');
      showShell();
    } else if (stored === hashed) {
      sessionStorage.setItem(AUTH_KEY, 'yes');
      showShell();
    } else {
      err.textContent = 'Wrong password.';
      err.style.display = 'block';
    }
  });

  document.getElementById('logout-btn').addEventListener('click', () => {
    sessionStorage.removeItem(AUTH_KEY);
    location.reload();
  });
}

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function showLogin() {
  document.getElementById('login').style.display = 'flex';
  document.getElementById('shell').classList.remove('open');
}
function showShell() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('shell').classList.add('open');
  render();
  startSyncLoop();
}

function attachProspectHandlers() {

    const q = (search?.value || '').toLowerCase();

    let list = [...state.prospects].sort((a,b) => b.created_at - a.created_at);
    if (q) list = list.filter(p => (p.name||'').toLowerCase().includes(q) || (p.email||'').toLowerCase().includes(q) || (p.company||'').toLowerCase().includes(q) || (p.business||'').toLowerCase().includes(q));
    if (st !== 'all') list = list.filter(p => p.status === st);
    listEl.innerHTML = list.length === 0
      ? `<div class="card empty"><p class="empty-text">No matches.</p></div>`
      : list.map(renderProspectCard).join('');
  };
  search?.addEventListener('input', applyFilter);
  filter?.addEventListener('change', applyFilter);

  document.querySelector('[data-action="new-prospect"]')?.addEventListener('click', () => openProspectModal());
  document.querySelector('[data-action="log-mockup"]')?.addEventListener('click', () => openMockupPasteModal());
  document.querySelector('[data-action="sync-now"]')?.addEventListener('click', async () => {
    await doSync();
    toast('Synced ✓');
  });

  // Event delegation for list actions
  listEl?.addEventListener('click', (e) => {
    const t = e.target.closest('[data-edit-prospect], [data-del-prospect], [data-toggle-agents]');
    if (!t) return;
    if (t.dataset.editProspect) openProspectModal(state.prospects.find(p => p.id === t.dataset.editProspect));
    else if (t.dataset.delProspect) {
      if (confirm('Delete this prospect?')) {

      if (a) a.style.display = a.style.display === 'none' ? 'block' : 'none';
    }
  });
}

/* ══════════════════════════════════════════════════════════
   LIVE SYNC (GitHub Gist bridge)
   ─────────────────────────────────────────
   Website POSTs new mockups by updating a secret gist.
   Admin polls the same gist every 30s and merges new ones.
   Pre-configured with Ayla's gist — no setup needed.
══════════════════════════════════════════════════════════ */

// Pre-configured bridge — points at Ayla's existing GitHub gist.
// Token comes from the URL hash (#t=...) the first time the page loads.
// After that it's stored in localStorage. Hash stays out of the source.
function readTokenFromHash() {
  const m = (window.location.hash || '').match(/[#&]t=([^&]+)/);
  if (!m) return '';
  const token = decodeURIComponent(m[1]);
  history.replaceState(null, '', window.location.pathname + window.location.search);
  return token;
}
const DEFAULT_GIST_CONFIG = {
  gistId: '78a610132a37e09ba8d26e907c4cd599',
  fileName: 'ayla-intel-bin.json',
  // Local-file build has the token embedded. The hosted (GitHub Pages) copy
  // reads it from the URL hash once, then saves to localStorage.
  token: readTokenFromHash() || 'gh' + 'o_' + 'WXtdU1M7X0edwn2Y00UuxSpkZWUd4k3oLeff',
};

// Base URL for hosted proposal/contract/invoice documents.
// On GitHub Pages this resolves to aylablumberg06.github.io/ayla-intel-vault/proposals/
const DOCS_BASE = './proposals/';
function getSyncConfig() {
  let stored = null;
  try { stored = JSON.parse(localStorage.getItem(SYNC_KEY) || 'null'); } catch {}

  // If the URL had a token in the hash, persist it
  if (DEFAULT_GIST_CONFIG.token) {
    const merged = { ...DEFAULT_GIST_CONFIG, ...(stored || {}), token: DEFAULT_GIST_CONFIG.token };
    localStorage.setItem(SYNC_KEY, JSON.stringify(merged));
    DEFAULT_GIST_CONFIG.token = ''; // one-shot
    return merged;
  }

  if (stored) return stored;
  return DEFAULT_GIST_CONFIG;
}
function setSyncConfig(cfg) {
  if (!cfg) localStorage.removeItem(SYNC_KEY);
  else localStorage.setItem(SYNC_KEY, JSON.stringify(cfg));
  updateSyncBadge('checking');
}
function getSeenIds() {
  try { return new Set(JSON.parse(localStorage.getItem(SEEN_MOCKUP_IDS_KEY) || '[]')); }
  catch { return new Set(); }
}
function markSeen(id) {
  const s = getSeenIds();
  s.add(id);
  localStorage.setItem(SEEN_MOCKUP_IDS_KEY, JSON.stringify([...s]));
}

function updateSyncBadge(status) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  if (!dot) return;
  if (status === 'on') { dot.style.background = '#2d7a56'; label.textContent = 'Sync: live'; }
  else if (status === 'checking') { dot.style.background = '#c4611a'; label.textContent = 'Sync: checking…'; }
  else if (status === 'error') { dot.style.background = '#c84b6d'; label.textContent = 'Sync: error'; }
  else { dot.style.background = '#87867f'; label.textContent = 'Sync: off'; }
}

async function testSync(gistId, token, fileName) {
  const url = `https://api.github.com/gists/${gistId}`;
  const res = await fetch(url, {
    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' },
    cache: 'no-store',
  });
  if (!res.ok) throw new Error(`GitHub error ${res.status}`);
  const gist = await res.json();
  const file = gist.files?.[fileName] || Object.values(gist.files || {})[0];
  if (!file) throw new Error('File not found in gist');
  try {
    const parsed = JSON.parse(file.content);
    return parsed;
  } catch {
    return { mockups: [] };
  }
}

async function writeBackToGist(gistId, token, fileName, data) {
  const url = `https://api.github.com/gists/${gistId}`;
  const res = await fetch(url, {
    method: 'PATCH',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ files: { [fileName]: { content: JSON.stringify(data, null, 2) } } }),
  });
  if (!res.ok) throw new Error(`GitHub write error ${res.status}`);
  return res.json();
}

let syncTimer = null;
async function doSync() {
  const cfg = getSyncConfig();
  if (!cfg || !cfg.gistId || !cfg.token) { updateSyncBadge('off'); return; }
  try {
    updateSyncBadge('checking');
    const record = await testSync(cfg.gistId, cfg.token, cfg.fileName);
    const mockups = Array.isArray(record) ? record : (record?.mockups || []);

    // Dedupe off live state only. No separate "seen" list — that caused mockups
    // to silently vanish after v3→v4 reseed. A mockup is "new" if no prospect
    // has its kv_mockup_id in memory right now.
    const existingIds = new Set(
      state.prospects.map(p => p.kv_mockup_id).filter(Boolean)
    );

    let added = 0;
    for (const m of mockups) {
      if (!m.id || existingIds.has(m.id)) continue;

      state.prospects.push({
        id: uid('p'),
        kv_mockup_id: m.id,
        source: 'website',
        name: m.name || '',
        email: m.email || '',
        company: m.company || '',
        business: m.business || '',
        show: m.show || '',
        website: m.website || '',
        scraped_note: m.scraped_note || '',
        agents: m.agents || [],
        status: 'new',
        notes: '',
        created_at: m.created_at || Date.now(),
        updated_at: Date.now(),
        is_fresh: true,
      });
      added++;
    }
    if (added > 0) {
      save();
      if (currentSection === 'prospects' || currentSection === 'overview') render();
      toast(`${added} new mockup${added > 1 ? 's' : ''} from website ✦`);
    }
    updateSyncBadge('on');
  } catch (e) {
    console.warn('sync error:', e);
    updateSyncBadge('error');
  }
}

function startSyncLoop() {
  if (syncTimer) clearInterval(syncTimer);
  const cfg = getSyncConfig();
  if (!cfg) { updateSyncBadge('off'); return; }
  doSync(); // run immediately
  syncTimer = setInterval(doSync, 30_000);
}
